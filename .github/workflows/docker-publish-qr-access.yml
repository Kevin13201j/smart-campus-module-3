name: Docker Publish - QR Access Service

on:
  push:
    branches:
      - qa
      - main
    paths:
      - apps/qr-access-service/**
      - .github/workflows/docker-publish-qr-access.yml
  workflow_dispatch:

env:
  IMAGE_NAME: kjkevin/qr-access-service
  SERVICE_PATH: apps/qr-access-service

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Docker image tag
        id: docker-tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=production" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_PATH }}
          file: ${{ env.SERVICE_PATH }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.docker-tag.outputs.tag }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
